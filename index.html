<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>챈선전 신청곡</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;color:#f0f0f0;font-family:'Malgun Gothic','Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:36px 32px;width:100%;max-width:500px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.logo-icon{background:#e00;color:#fff;font-size:16px;font-weight:700;padding:6px 12px;border-radius:8px}
h1{font-size:22px;font-weight:700;color:#fff}
.sub{font-size:13px;color:#888;margin-bottom:4px;margin-top:4px}
.limit-info{font-size:12px;color:#7c3aed;margin-bottom:20px;min-height:18px}
label{display:block;font-size:12px;color:#888;margin-bottom:6px;margin-top:18px}
input{width:100%;background:#222;border:1px solid #333;border-radius:8px;color:#eee;font-family:inherit;font-size:14px;padding:12px 14px;outline:none;transition:border-color .15s}
input:focus{border-color:#e00}
input::placeholder{color:#444}
.btn{width:100%;margin-top:22px;background:#e00;color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:15px;font-weight:700;padding:14px;cursor:pointer;transition:background .15s}
.btn:hover{background:#c00}
.btn:disabled{background:#333;color:#666;cursor:not-allowed}
.msg{margin-top:12px;font-size:13px;text-align:center;min-height:20px}
.msg.ok{color:#4ade80}
.msg.err{color:#f87171}
.divider{border:none;border-top:1px solid #222;margin:24px 0}
.queue-title{font-size:13px;color:#666;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.queue-title span{background:#222;color:#aaa;font-size:11px;padding:2px 8px;border-radius:10px}
.q-item{background:#222;border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.q-num{font-size:11px;color:#555;min-width:20px;text-align:center;font-weight:700}
.q-info{flex:1;min-width:0}
.q-title{font-size:13px;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-req{font-size:11px;color:#666;margin-top:2px}
.empty{font-size:13px;color:#444;text-align:center;padding:16px 0}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">▶</div>
    <h1>챈선전 신청곡</h1>
  </div>
  <div class="sub">YouTube URL을 입력해서 신청하세요!</div>
  <div class="limit-info" id="limitInfo">최대 3곡까지 신청 가능합니다.</div>

  <label>닉네임</label>
  <input type="text" id="name" placeholder="닉네임 입력" maxlength="20">

  <label>YouTube URL</label>
  <input type="text" id="url" placeholder="https://youtu.be/... 또는 youtube.com/watch?v=...">

  <button class="btn" id="submitBtn" onclick="submitRequest()">신청하기</button>
  <div class="msg" id="msg"></div>

  <hr class="divider">

  <div class="queue-title">
    현재 대기열 <span id="qcount">0곡</span>
  </div>
  <div id="qlist"><div class="empty">아직 신청곡이 없습니다</div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, serverTimestamp, query, orderByChild, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAVUTfLEyC8kuW4jjLjYrjD4Gtw84pKhLg",
  databaseURL: "https://chan-1c62d-default-rtdb.firebaseio.com",
  projectId: "chan-1c62d",
  authDomain: "chan-1c62d.firebaseapp.com",
};

const LIMIT = 3;
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// 브라우저 고유 ID 생성 (localStorage에 저장)
function getBrowserId() {
  let id = localStorage.getItem('chan_browser_id');
  if (!id) {
    id = 'br_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem('chan_browser_id', id);
  }
  return id;
}

const browserId = getBrowserId();

// 내 신청곡 키 목록 (localStorage)
function getMyKeys() {
  return JSON.parse(localStorage.getItem('chan_my_keys') || '[]');
}
function addMyKey(key) {
  const keys = getMyKeys();
  keys.push(key);
  localStorage.setItem('chan_my_keys', JSON.stringify(keys));
}
function removeMyKey(key) {
  const keys = getMyKeys().filter(k => k !== key);
  localStorage.setItem('chan_my_keys', JSON.stringify(keys));
}

// 현재 대기열에서 내 신청곡 수 확인
let currentKeys = new Set();

function updateLimitInfo() {
  const myKeys = getMyKeys();
  const activeCount = myKeys.filter(k => currentKeys.has(k)).length;
  // 삭제된 키 정리
  const validKeys = myKeys.filter(k => currentKeys.has(k));
  localStorage.setItem('chan_my_keys', JSON.stringify(validKeys));

  const remaining = LIMIT - activeCount;
  const info = document.getElementById('limitInfo');
  const btn = document.getElementById('submitBtn');
  if (remaining <= 0) {
    info.textContent = '신청 가능한 곡 수를 모두 사용했습니다. 재생 완료 후 다시 신청해주세요.';
    info.style.color = '#f87171';
    btn.disabled = true;
  } else {
    info.textContent = `신청 가능: ${remaining}곡 남음 (${activeCount}/3)`;
    info.style.color = remaining <= 1 ? '#fb923c' : '#7c3aed';
    btn.disabled = false;
  }
}

function extractId(url) {
  try {
    const u = new URL(url.trim());
    if (u.hostname.includes('youtu.be')) return u.pathname.slice(1).split('?')[0];
    if (u.hostname.includes('youtube.com')) {
      if (u.searchParams.get('v')) return u.searchParams.get('v');
      for (const p of ['/shorts/','/embed/','/live/'])
        if (u.pathname.startsWith(p)) return u.pathname.slice(p.length).split('?')[0];
    }
  } catch(e){}
  const m = url.match(/(?:v=|youtu\.be\/|shorts\/|embed\/|live\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

window.submitRequest = async function() {
  const name = document.getElementById('name').value.trim();
  const url  = document.getElementById('url').value.trim();
  const msg  = document.getElementById('msg');
  const btn  = document.getElementById('submitBtn');
  msg.className = 'msg';

  if (!name) { msg.textContent='닉네임을 입력해 주세요.'; msg.className='msg err'; return; }
  if (!url)  { msg.textContent='URL을 입력해 주세요.';   msg.className='msg err'; return; }
  if (!extractId(url)) { msg.textContent='유효한 YouTube URL이 아닙니다.'; msg.className='msg err'; return; }

  const myKeys = getMyKeys();
  const activeCount = myKeys.filter(k => currentKeys.has(k)).length;
  if (activeCount >= LIMIT) {
    msg.textContent = '신청 가능한 곡 수를 모두 사용했습니다. 재생 완료 후 다시 신청해주세요.';
    msg.className = 'msg err';
    return;
  }

  btn.disabled=true; btn.textContent='신청 중...';
  try {
    const result = await push(ref(db,'requests'), { name, url, ts: serverTimestamp() });
    addMyKey(result.key);
    msg.textContent='✅ 신청되었습니다!'; msg.className='msg ok';
    document.getElementById('url').value='';
    setTimeout(()=>{ msg.textContent=''; },3000);
    updateLimitInfo();
  } catch(e) {
    msg.textContent='오류가 발생했습니다.'; msg.className='msg err';
  }
  btn.disabled=false; btn.textContent='신청하기';
};

// 실시간 대기열
onValue(query(ref(db,'requests'), orderByChild('ts')), snap => {
  const data = snap.val() || {};
  currentKeys = new Set(Object.keys(data));
  const items = Object.entries(data).sort((a,b)=>(a[1].ts||0)-(b[1].ts||0));
  document.getElementById('qcount').textContent = items.length + '곡';
  const el = document.getElementById('qlist');
  if (!items.length) { el.innerHTML='<div class="empty">아직 신청곡이 없습니다</div>'; return; }
  el.innerHTML = items.map(([k,v],i) => `
    <div class="q-item">
      <div class="q-num">${i+1}</div>
      <div class="q-info">
        <div class="q-title">${esc(v.url)}</div>
        <div class="q-req">신청자: ${esc(v.name)}</div>
      </div>
    </div>`).join('');
  updateLimitInfo();
});

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
document.addEventListener('keydown', e=>{ if(e.key==='Enter') window.submitRequest(); });
</script>
</body>
</html>
