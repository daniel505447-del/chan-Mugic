<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>챈선전 - 관리자</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0f0f0f;color:#f0f0f0;font-family:'Malgun Gothic','Segoe UI',sans-serif}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:40px 36px;width:100%;max-width:380px;text-align:center}
.login-card h1{font-size:20px;font-weight:700;margin-bottom:6px}
.login-card p{font-size:13px;color:#888;margin-bottom:28px}
.login-card input{width:100%;background:#222;border:1px solid #333;border-radius:8px;color:#eee;font-family:inherit;font-size:15px;padding:13px 16px;outline:none;text-align:center;letter-spacing:4px;margin-bottom:14px}
.login-card input:focus{border-color:#1d4ed8}
.login-btn{width:100%;background:#1d4ed8;color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:15px;font-weight:700;padding:13px;cursor:pointer}
.login-btn:hover{background:#1e40af}
.login-err{font-size:13px;color:#f87171;margin-top:10px;min-height:18px}
#app{display:none;flex-direction:column;height:100vh}
#header{background:#111;border-bottom:1px solid #1e1e1e;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo-icon{background:#e00;color:#fff;font-size:13px;font-weight:700;padding:4px 10px;border-radius:6px}
#header h1{font-size:16px;font-weight:600}
#hbadge{font-size:11px;color:#888;background:#1a1a1a;padding:3px 10px;border-radius:10px;margin-left:auto}
#logout-btn{font-size:12px;color:#666;background:none;border:1px solid #333;border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit}
#logout-btn:hover{color:#f87171;border-color:#f87171}
#main{display:flex;flex:1;overflow:hidden}
#sidebar{width:300px;background:#111;border-right:1px solid #1e1e1e;display:flex;flex-direction:column;flex-shrink:0}
#sidebar-top{padding:10px 12px;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;justify-content:space-between}
#sidebar-top span{font-size:12px;color:#888}
.small-btn{background:#222;border:1px solid #2e2e2e;color:#aaa;font-family:inherit;font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer}
.small-btn:hover{color:#e00}
#queue-list{flex:1;overflow-y:auto;padding:4px 0}
#queue-list::-webkit-scrollbar{width:4px}
#queue-list::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
.q-item{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-left:3px solid transparent;transition:background .1s}
.q-item:hover{background:#1a1a1a}
.q-item.active{background:#1a1a1a;border-left-color:#e00}
.q-num{font-size:11px;color:#555;min-width:18px;text-align:right;flex-shrink:0}
.q-item.active .q-num{color:#e00}
.q-info{flex:1;min-width:0}
.q-title{font-size:12px;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-item.active .q-title{color:#fff;font-weight:600}
.q-req{font-size:10px;color:#666;margin-top:1px}
.q-badge{color:#e00;font-size:10px}
.q-del{background:none;border:none;color:#444;font-size:14px;cursor:pointer;padding:2px 5px;border-radius:3px;flex-shrink:0}
.q-del:hover{color:#f87171}
.q-empty{font-size:13px;color:#444;text-align:center;padding:24px 0}
#add-section{padding:8px 10px;border-top:1px solid #1e1e1e}
#add-row{display:flex;gap:5px;margin-bottom:5px}
#add-name{width:80px;background:#222;border:1px solid #2e2e2e;border-radius:6px;color:#eee;font-family:inherit;font-size:12px;padding:6px 8px;outline:none}
#add-url{flex:1;background:#222;border:1px solid #2e2e2e;border-radius:6px;color:#eee;font-family:inherit;font-size:12px;padding:6px 8px;outline:none}
#add-url::placeholder,#add-name::placeholder{color:#444}
#add-btn{background:#1d4ed8;border:none;color:#fff;font-family:inherit;font-size:12px;font-weight:700;padding:6px 10px;border-radius:6px;cursor:pointer}
#sidebar-controls{padding:8px 10px;border-top:1px solid #1e1e1e;display:flex;gap:5px}
.ctrl{background:#1e1e1e;border:1px solid #2e2e2e;color:#ddd;font-family:inherit;font-size:12px;font-weight:600;padding:7px 10px;border-radius:6px;cursor:pointer;flex:1}
.ctrl:hover{background:#2a2a2a}
.ctrl:disabled{opacity:.3;cursor:not-allowed}
.ctrl.blue{background:#1d4ed8;border-color:#1d4ed8;color:#fff}
.ctrl.blue:hover{background:#1e40af}
#player-area{flex:1;display:flex;flex-direction:column;background:#000;min-width:0}
#video-wrap{position:relative;width:100%;flex:1;background:#000;overflow:hidden}
#yt-frame{position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:none}
#placeholder{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
#placeholder .icon{font-size:48px;opacity:.2}
#placeholder p{font-size:14px;color:#444}
#pcontrols{background:#111;border-top:1px solid #1e1e1e;padding:10px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
#now-info{flex:1;min-width:0}
#now-title{font-size:13px;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#now-req{font-size:11px;color:#666;margin-top:2px}
#prog{font-size:12px;color:#555;white-space:nowrap}
.auto-lbl{font-size:12px;color:#888;display:flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap}
.auto-lbl input{accent-color:#e00;cursor:pointer}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#222;color:#fff;font-size:13px;font-weight:600;padding:10px 22px;border-radius:8px;display:none;z-index:999;border:1px solid #333}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1>🔐 관리자 로그인</h1>
    <p>챈선전 신청곡 관리자 페이지</p>
    <input type="password" id="pw-input" placeholder="비밀번호">
    <button class="login-btn" id="login-btn">로그인</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div id="app">
  <div id="header">
    <div class="logo-icon">▶</div>
    <h1>챈선전 신청곡 - 관리자</h1>
    <div id="hbadge">대기 0곡</div>
    <button id="logout-btn">로그아웃</button>
  </div>
  <div id="main">
    <div id="sidebar">
      <div id="sidebar-top">
        <span>신청 대기열</span>
        <button class="small-btn" id="clear-btn">전체 삭제</button>
      </div>
      <div id="queue-list"><div class="q-empty">신청곡이 없습니다</div></div>
      <div id="add-section">
        <div id="add-row">
          <input type="text" id="add-name" placeholder="닉네임">
          <input type="text" id="add-url" placeholder="YouTube URL">
          <button id="add-btn">추가</button>
        </div>
      </div>
      <div id="sidebar-controls">
        <button class="ctrl blue" id="btn-play">▶ 재생</button>
        <button class="ctrl" id="btn-prev" disabled>⏮ 이전</button>
        <button class="ctrl" id="btn-next" disabled>⏭ 다음</button>
      </div>
    </div>
    <div id="player-area">
      <div id="video-wrap">
        <div id="placeholder">
          <div class="icon">▶</div>
          <p>재생 버튼을 눌러 시작하세요</p>
        </div>
        <iframe id="yt-frame" allowfullscreen allow="autoplay; encrypted-media"></iframe>
      </div>
      <div id="pcontrols">
        <div id="now-info">
          <div id="now-title">대기 중...</div>
          <div id="now-req"></div>
        </div>
        <div id="prog"></div>
        <label class="auto-lbl"><input type="checkbox" id="auto-next" checked> 자동 다음</label>
        <label class="auto-lbl"><input type="checkbox" id="auto-del" checked> 끝나면 삭제</label>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
// ★ Firebase 설정값 입력 ★
const firebaseConfig = {
  apiKey: "AIzaSyAVUTfLEyC8kuW4jjLjYrjD4Gtw84pKhLg",
  databaseURL: "https://chan-1c62d-default-rtdb.firebaseio.com",
  projectId: "chan-1c62d",
  authDomain: "chan-1c62d.firebaseapp.com",
};

// ★ 관리자 비밀번호 ★
const ADMIN_PASSWORD = "1234";

// ── Firebase 초기화 ──────────────────────────────────────
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── 상태 ────────────────────────────────────────────────
let playlist = [];
let currentIndex = -1;
let ytReady = false;
let pendingPlay = false;

// ── 로그인 ───────────────────────────────────────────────
document.getElementById('login-btn').onclick = doLogin;
document.getElementById('pw-input').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    initFirebase();
  } else {
    document.getElementById('login-err').textContent = '비밀번호가 틀렸습니다.';
    document.getElementById('pw-input').value = '';
  }
}

document.getElementById('logout-btn').onclick = () => location.reload();

// ── Firebase 실시간 ───────────────────────────────────────
function initFirebase() {
  db.ref('requests').orderByChild('ts').on('value', snap => {
    const data = snap.val() || {};
    const currentKey = currentIndex >= 0 && playlist[currentIndex] ? playlist[currentIndex].key : null;
    playlist = Object.entries(data)
      .map(([key, v]) => ({ key, name: v.name||'익명', url: v.url||'', title: v.title || v.url || '로딩중...', ts: v.ts||0 }))
      .sort((a,b) => a.ts - b.ts);
    playlist.forEach((item, i) => {
      if (!item.title || item.title === item.url || item.title === '로딩중...') fetchTitle(item, i);
    });
    if (currentKey) {
      const ni = playlist.findIndex(p => p.key === currentKey);
      currentIndex = ni >= 0 ? ni : Math.min(currentIndex, playlist.length - 1);
    }
    renderQueue();
    updateHeader();
  });
}

function fetchTitle(item, idx) {
  const vid = extractId(item.url);
  if (!vid) return;
  fetch('https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v='+vid+'&format=json')
    .then(r=>r.json()).then(d=>{
      if (playlist[idx] && playlist[idx].key === item.key) {
        playlist[idx].title = d.title || item.url;
        renderQueue();
        if (idx === currentIndex) updateNowInfo();
      }
    }).catch(()=>{});
}

// ── 렌더 ─────────────────────────────────────────────────
function renderQueue() {
  const el = document.getElementById('queue-list');
  if (!playlist.length) { el.innerHTML='<div class="q-empty">신청곡이 없습니다</div>'; return; }
  el.innerHTML = playlist.map((p,i) => `
    <div class="q-item${i===currentIndex?' active':''}" data-idx="${i}">
      <div class="q-num">${i+1}</div>
      <div class="q-info">
        <div class="q-title">${esc(p.title)}</div>
        <div class="q-req">신청자: ${esc(p.name)}${i===currentIndex?' <span class="q-badge">▶</span>':''}</div>
      </div>
      <button class="q-del" data-key="${p.key}">✕</button>
    </div>`).join('');
  el.querySelectorAll('.q-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.classList.contains('q-del')) return;
      playIndex(parseInt(el.dataset.idx));
    });
  });
  el.querySelectorAll('.q-del').forEach(btn => {
    btn.addEventListener('click', () => deleteItem(btn.dataset.key));
  });
  if (currentIndex >= 0) {
    const items = el.querySelectorAll('.q-item');
    if (items[currentIndex]) items[currentIndex].scrollIntoView({block:'nearest',behavior:'smooth'});
  }
}

function updateHeader() {
  document.getElementById('hbadge').textContent = '대기 ' + playlist.length + '곡';
  document.getElementById('btn-prev').disabled = currentIndex <= 0;
  document.getElementById('btn-next').disabled = currentIndex < 0 || currentIndex >= playlist.length - 1;
}

// ── 삭제 ─────────────────────────────────────────────────
function deleteItem(key) {
  db.ref('requests/' + key).remove();
}

document.getElementById('clear-btn').onclick = () => {
  if (!playlist.length) return;
  if (!confirm('모든 신청곡을 삭제할까요?')) return;
  playlist.forEach(p => db.ref('requests/' + p.key).remove());
  stopPlayer(); currentIndex = -1;
};

// ── 수동 추가 ────────────────────────────────────────────
document.getElementById('add-btn').onclick = addManual;
document.getElementById('add-url').addEventListener('keydown', e => { if(e.key==='Enter') addManual(); });

function addManual() {
  const name = document.getElementById('add-name').value.trim() || '관리자';
  const url  = document.getElementById('add-url').value.trim();
  if (!url) { showToast('URL을 입력해 주세요.'); return; }
  if (!extractId(url)) { showToast('유효한 YouTube URL이 아닙니다.'); return; }
  db.ref('requests').push({ name, url, ts: firebase.database.ServerValue.TIMESTAMP });
  document.getElementById('add-url').value = '';
  showToast('추가되었습니다!');
}

// ── 재생 ─────────────────────────────────────────────────
document.getElementById('btn-play').onclick = () => {
  if (!playlist.length) { showToast('대기열이 비어있습니다.'); return; }
  playIndex(0);
};
document.getElementById('btn-prev').onclick = () => { if(currentIndex>0) playIndex(currentIndex-1); };
document.getElementById('btn-next').onclick = () => { if(currentIndex<playlist.length-1) playIndex(currentIndex+1); };

function playIndex(idx) {
  if (idx < 0 || idx >= playlist.length) return;
  currentIndex = idx;
  const vid = extractId(playlist[idx].url);
  if (!vid) { showToast('재생할 수 없는 URL입니다.'); return; }
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('yt-frame').style.display = 'block';

  // youtube-nocookie + enablejsapi + origin
  const src = `https://www.youtube.com/embed/${vid}?autoplay=1&enablejsapi=1&rel=0&modestbranding=1&playsinline=1&origin=https://daniel505447-del.github.io`;
  document.getElementById('yt-frame').src = src;

  updateNowInfo();
  renderQueue();
  updateHeader();
}

function stopPlayer() {
  document.getElementById('yt-frame').src = '';
  document.getElementById('yt-frame').style.display = 'none';
  document.getElementById('placeholder').style.display = '';
  document.getElementById('now-title').textContent = '대기 중...';
  document.getElementById('now-req').textContent = '';
  document.getElementById('prog').textContent = '';
}

function updateNowInfo() {
  const p = playlist[currentIndex];
  if (!p) return;
  document.getElementById('now-title').textContent = p.title;
  document.getElementById('now-req').textContent = '신청자: ' + p.name;
  document.getElementById('prog').textContent = (currentIndex+1) + ' / ' + playlist.length;
}

// YouTube postMessage로 영상 끝 감지
window.addEventListener('message', async e => {
  let data;
  try { data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data; } catch(ex){ return; }
  const state = data.event === 'onStateChange' ? data.info :
    (data.info && typeof data.info.playerState !== 'undefined' ? data.info.playerState : null);
  if (state !== 0) return; // 0 = ended

  const autoDel  = document.getElementById('auto-del').checked;
  const autoNext = document.getElementById('auto-next').checked;
  const finishedKey = playlist[currentIndex]?.key;

  if (autoDel && finishedKey) {
    await db.ref('requests/' + finishedKey).remove();
    // Firebase onValue가 playlist 자동 업데이트
    // currentIndex 유지 = 삭제 후 같은 위치 = 다음 영상
  }
  if (autoNext) {
    setTimeout(() => {
      if (playlist.length > 0 && currentIndex < playlist.length) playIndex(currentIndex);
      else { stopPlayer(); currentIndex=-1; showToast('✅ 모든 영상 재생 완료!'); }
    }, 1000);
  }
});

// ── 유틸 ─────────────────────────────────────────────────
function extractId(url) {
  if (!url) return null;
  try {
    const u = new URL(url.trim());
    if (u.hostname.includes('youtu.be')) return u.pathname.slice(1).split('?')[0];
    if (u.hostname.includes('youtube.com')) {
      if (u.searchParams.get('v')) return u.searchParams.get('v');
      for (const p of ['/shorts/','/embed/','/live/'])
        if (u.pathname.startsWith(p)) return u.pathname.slice(p.length).split('?')[0];
    }
  } catch(e){}
  const m = url.match(/(?:v=|youtu\.be\/|shorts\/|embed\/|live\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',3000);
}
</script>
</body>
</html>
